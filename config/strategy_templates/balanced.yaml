# Balanced strategy template
# Equal weights across model, value, quality; default rebalance
# Use with: python scripts/diversified_backtest.py --templates balanced
description: "Balanced: equal factor weights, default rebalance"
backtest:
  train_years: 1.0   # Use 2.0 with extended data
  test_years: 0.25
  step_value: 1.0
  step_unit: months
  rebalance_freq: MS
  top_n: 10
  top_pct: 0.1
  transaction_cost: 0.001
analysis:
  weights:
    model_score: 0.40
    value_score: 0.30
    quality_score: 0.30
