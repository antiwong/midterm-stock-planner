# Low-volatility strategy template
# Slower rebalance (lower turnover), longer train for stability
# Use with: python scripts/diversified_backtest.py --templates low_vol
description: "Low-vol: slower rebalance, longer train, lower turnover"
backtest:
  train_years: 1.0   # Use 3.0 with extended data
  test_years: 0.25
  step_value: 2.0
  step_unit: months
  rebalance_freq: ME
  top_n: 10
  top_pct: 0.1
  transaction_cost: 0.001
analysis:
  weights:
    model_score: 0.35
    value_score: 0.35
    quality_score: 0.30
