model:
  target_col: target
  test_size: 0.2
  random_state: 42
  model_type: lightgbm
  params:
    n_estimators: 200
    learning_rate: 0.03
    max_depth: 6
    num_leaves: 15
    min_child_samples: 50
    reg_alpha: 0.3
    reg_lambda: 0.5
    subsample: 0.7
    colsample_bytree: 0.7
    early_stopping_rounds: 30
# MACD/RSI params for trigger backtest and feature engineering.
# Run scripts/optimize_macd_rsi_bayesian.py and use --save to overwrite with optimized values.
trigger:
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  rsi_period: 14
  rsi_overbought: 70
  rsi_oversold: 30
  # Path to Bayesian-optimized params JSON (overrides above when set and file exists)
  optimized_params_path: output/best_params.json

backtest:
  train_years: 3.0   # 3yr training on daily features (covers regime changes)
  test_years: 0.5    # 6 months test window
  step_value: 7
  step_unit: days   # Walk-forward step: weekly (7d ≈ 264 windows vs 1849)
  rebalance_freq: 4h  # Mid-term trading: rebalance every 4 hours
  top_n: 5
  top_pct: 0.1
  min_stocks: 5
  transaction_cost: 0.001
  start_date: null
  end_date: null
  # Position sizing controls (addresses guard violations: -55% to -72% drawdowns)
  max_position_weight: 0.20   # Max 20% in any single stock
  stop_loss_pct: -0.08        # Cut position at -8% from entry (tightened from -15%)
  stop_loss_cooldown_days: 5  # Don't re-enter a stopped-out ticker for 5 trading days
  vix_scale_enabled: true     # Reduce exposure during high-VIX periods
  vix_high_threshold: 30.0    # VIX > 30 = reduce to 60% exposure
  vix_extreme_threshold: 40.0 # VIX > 40 = reduce to 30% exposure
  vix_high_scale: 0.6
  vix_extreme_scale: 0.3
  # Market regime cash rule — reduce exposure when SPY is in drawdown
  market_regime_filter:
    enabled: true
    indicator: SPY
    lookback_days: 20
    threshold_reduce: -0.05   # SPY 20d return < -5% → scale to 30% position size
    threshold_exit: -0.08     # SPY 20d return < -8% → go to cash entirely
    reduce_scale: 0.30        # Position size multiplier when in reduce mode
data:
  interval: 1h  # 1h for 4h rebalancing. Features computed from daily data.
  price_data_path: data/prices.csv  # Hourly data for execution/rebalancing (127 tickers, 752d, has NaN gaps)
  # NOTE: prices_daily.csv is preferred for regression testing — it has 10yr coverage,
  # zero NaN, and all 13 tech_giants. prices.csv is missing AAPL/AMD/GOOGL/TSLA/ADBE/NFLX.
  price_data_path_daily: data/prices_daily.csv  # 10yr daily for features (114 tickers, zero NaN)
  price_data_path_15m: data/prices_15m.csv  # 15m intraday (when available)
  fundamental_data_path: data/fundamentals.csv
  benchmark_data_path: data/benchmark.csv  # Hourly SPY for backtest alignment
  benchmark_data_path_daily: data/benchmark_daily.csv  # 10yr daily SPY for features
  macro_data_path: data/macro_fred.csv  # FRED macro data (yields, inflation, etc.)
  universe_path: data/universe.txt
  sentiment_news_path: data/news.csv
  output_dir: output
  models_dir: models
features:
  # RSI/MACD params for feature engineering (used in walk-forward backtest)
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  return_periods:
  - 21
  - 63
  - 126
  - 252
  volatility_windows:
  - 20
  - 60
  volume_window: 20
  include_fundamentals: true
  # Feature toggles (validated by regression test reg_20260315_152332 on tech_giants)
  # Optimal set: baseline + macd + bollinger + adx → Sharpe=1.34
  include_technical: true     # MACD, Bollinger, ATR, ADX
  include_rsi: false          # RSI hurts cross-sectional model (-0.28 Sharpe)
  include_obv: false          # OBV hurts Sharpe for broad universe (-0.18). Only helped top_n=5 niche case.
  include_momentum: false     # Momentum hurts cross-sectional model (-0.24 Sharpe)
  include_mean_reversion: false  # Mean reversion adds noise
  horizon_days: 63
  # Per-watchlist feature transforms
  # NOTE: invert_atr was tested on 2026-03-25 but improvements were artifacts of
  # an index alignment bug in make_training_dataset (fixed same day). With correct
  # full data (32,500 rows vs 4,874), invert_atr helps 0/10 watchlists.
  watchlist_overrides: {}
  # ── SENTIMENT IN RANKER ─────────────────────────────────────────────────
  # DO NOT SET TO TRUE. Sentiment in the cross-sectional ranker degrades
  # Sharpe by -0.18 to -0.28. Sentiment is consumed ONLY by the Sentiment
  # Trigger Layer (sentiment_trigger.*), which is architecturally separate.
  # See sentimental_blogs/docs/10-improvement-suggestions.md for root cause.
  use_sentiment: false        # PERMANENTLY FALSE — do not change
  sentiment_source: news      # Legacy — superseded by SentimentPulse
  sentiment_lookbacks:
  - 1
  - 7
  - 14
  sentiment_min_count: 1
  sentiment_fillna: 0.0
  # Cross-asset / macro features (disabled by default; enable per-ticker)
  use_cross_asset: false
  cross_asset:
    zscore_window: 60         # Gold/silver ratio z-score lookback
    dxy_lookback: 21          # Dollar index momentum lookback (days)
    real_yield_lookback: 63   # TIP real yield proxy lookback (days)
    nvda_lookback: 21         # NVDA peer momentum lookback (days)
    breadth_lookback: 21      # Semi sector breadth lookback (days)
    qqq_lookback: 63          # QQQ relative strength lookback (days)
    rotation_lookback: 20     # Capital rotation feature lookback (days, tunable 10-42)
    include_btc: true         # Include BTC-USD rotation features
sentiment:
  # Legacy sentiment config — superseded by SentimentPulse + Trigger Layer.
  # Kept for backward compatibility during transition. Will be removed after
  # 90 days of stable SentimentPulse operation. See Gap 6 in gap analysis.
  news_data_path: null
  model_type: lexicon
  text_column: headline
  market_close_hour: 16
  timezone: null
  lookbacks:
  - 1
  - 7
  - 14
  min_daily_count: 1
  include_volume_features: true
  include_trend_features: true
  ranker_fillna_value: 0.0    # Renamed from fillna_value (Gap 5: only applies to ranker)
  fillna_value: 0.0           # Keep old key for compat

# ── SENTIMENT TRIGGER LAYER (NEW ARCHITECTURE) ────────────────────────────
# Operates AFTER the cross-sectional ranker. The ranker produces candidates;
# the trigger layer gates entry timing using SentimentPulse data.
# Set enabled=true when SentimentPulse has ≥30 days of data.
sentiment_trigger:
  enabled: false              # Set true after SentimentPulse is stable
  source: "sentimentpulse"
  data_dir: "data/sentiment/"
  feedback_dir: "data/sentiment/feedback/"
  no_data_behavior: skip      # skip | hold | noise (Gap 5)
  entry_confirmation_threshold: 0.20
  divergence_boost: true
  options_veto_pcr: 1.8
  options_veto_iv_pct: 85
  unusual_options_override: true
  ema_spans: [3, 7]
  decay_halflife_by_category:
    earnings: 12
    management: 30
    product: 6
    macro: 2
    policy: 17
    competition: 5
    other: 4
cli:
  output_format: table
  verbose: true
  save_results: true
  results_path: null
  # Set to false to store returns/positions only in database (reduces CSV files)
  save_backtest_csv: true
regression:
  # Feature regression testing configuration
  baseline_features:
  - returns
  - volatility
  - volume
  # Optimal feature order based on regression test reg_20260315_152332 (tech_giants).
  # Validated: macd (+0.15 Sharpe), bollinger (+0.64), adx (+0.08).
  # Features that hurt performance: rsi (-0.28), momentum (-0.24), obv (-0.18).
  default_feature_order:
  - macd
  - bollinger
  - adx
  - valuation
  - gap
  - atr
  - obv
  - rsi
  - momentum
  - mean_reversion
  - sentiment
  # Recommended production feature set (validated optimal):
  # baseline + macd + bollinger + adx → Sharpe=1.34, RankIC=0.48
  recommended_features:
  - macd
  - bollinger
  - adx
  tune_on_add: false          # Bayesian-optimize feature params when adding
  tune_model_params: false    # Tune LightGBM hyperparams at end
  tuning_trials: 30           # Trials per feature (8 random + 22 Bayesian)
  model_tuning_trials: 50     # Trials for model tuning
  objective_metric: mean_rank_ic  # Optimization target (NOT Sharpe — IC is more granular)
  significance_alpha: 0.05    # p-value threshold for significance tests
  n_bootstrap: 1000           # Bootstrap resamples for Sharpe CI
  # Guard metric thresholds
  max_drawdown_threshold: -0.30
  turnover_threshold: 0.80
  overfit_sharpe_ratio_threshold: 2.5
  ic_pct_positive_threshold: 0.50
analysis:
  # Composite domain score weights (must sum to 1.0)
  # Optimized to balance factor variance contributions (reduces value_score dominance)
  weights:
    model_score: 0.49   # LightGBM predicted excess return (increased from 0.40)
    value_score: 0.20   # Valuation (PE rank, PB rank) (reduced from 0.35 to balance variance)
    quality_score: 0.31 # Quality (ROE, margins) (increased from 0.25)
  filters:
    min_roe: 0.03
    min_net_margin: 0.02
    max_debt_to_equity: 1.8
    min_market_cap: null
    min_avg_volume: null
  vertical:
    top_k_per_sector: 8
    export_candidates: true
  horizontal:
    portfolio_size: 10
    max_position_weight: 0.15
    min_position_weight: 0.02
    max_sector_weight: 0.3
    target_max_drawdown: 0.2
    target_volatility: 0.25
    min_diversification: 0.7
    selection_method: heuristic
    max_combinations: 1000
