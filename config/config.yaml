model:
  target_col: target
  test_size: 0.2
  random_state: 42
  model_type: lightgbm
  params:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: -1
    num_leaves: 31
# MACD/RSI params for trigger backtest and feature engineering.
# Run scripts/optimize_macd_rsi_bayesian.py and use --save to overwrite with optimized values.
trigger:
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  rsi_period: 14
  rsi_overbought: 70
  rsi_oversold: 30
  # Path to Bayesian-optimized params JSON (overrides above when set and file exists)
  optimized_params_path: output/best_params.json

backtest:
  train_years: 3.0   # 3yr training on daily features (covers regime changes)
  test_years: 0.5    # 6 months test window
  step_value: 7
  step_unit: days   # Walk-forward step: weekly (7d ≈ 264 windows vs 1849)
  rebalance_freq: 4h  # Mid-term trading: rebalance every 4 hours
  top_n: 10
  top_pct: 0.1
  min_stocks: 5
  transaction_cost: 0.001
  start_date: null
  end_date: null
data:
  interval: 1h  # 1h for 4h rebalancing. Features computed from daily data.
  price_data_path: data/prices.csv  # Hourly data for execution/rebalancing
  price_data_path_daily: data/prices_daily.csv  # 10yr daily for features (114 tickers)
  price_data_path_15m: data/prices_15m.csv  # 15m intraday (when available)
  fundamental_data_path: data/fundamentals.csv
  benchmark_data_path: data/benchmark.csv  # Hourly SPY for backtest alignment
  benchmark_data_path_daily: data/benchmark_daily.csv  # 10yr daily SPY for features
  macro_data_path: data/macro_fred.csv  # FRED macro data (yields, inflation, etc.)
  universe_path: data/universe.txt
  sentiment_news_path: data/news.csv
  output_dir: output
  models_dir: models
features:
  # RSI/MACD params for feature engineering (used in walk-forward backtest)
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  return_periods:
  - 21
  - 63
  - 126
  - 252
  volatility_windows:
  - 20
  - 60
  volume_window: 20
  include_fundamentals: true
  horizon_days: 63
  use_sentiment: false
  sentiment_source: news
  sentiment_lookbacks:
  - 1
  - 7
  - 14
  sentiment_min_count: 1
  sentiment_fillna: 0.0
  # Cross-asset / macro features (disabled by default; enable per-ticker)
  use_cross_asset: false
  cross_asset:
    zscore_window: 60         # Gold/silver ratio z-score lookback
    dxy_lookback: 21          # Dollar index momentum lookback (days)
    real_yield_lookback: 63   # TIP real yield proxy lookback (days)
    nvda_lookback: 21         # NVDA peer momentum lookback (days)
    breadth_lookback: 21      # Semi sector breadth lookback (days)
    qqq_lookback: 63          # QQQ relative strength lookback (days)
sentiment:
  news_data_path: null
  model_type: lexicon
  text_column: headline
  market_close_hour: 16
  timezone: null
  lookbacks:
  - 1
  - 7
  - 14
  min_daily_count: 1
  include_volume_features: true
  include_trend_features: true
  fillna_value: 0.0
cli:
  output_format: table
  verbose: true
  save_results: true
  results_path: null
  # Set to false to store returns/positions only in database (reduces CSV files)
  save_backtest_csv: true
analysis:
  # Composite domain score weights (must sum to 1.0)
  # Optimized to balance factor variance contributions (reduces value_score dominance)
  weights:
    model_score: 0.49   # LightGBM predicted excess return (increased from 0.40)
    value_score: 0.20   # Valuation (PE rank, PB rank) (reduced from 0.35 to balance variance)
    quality_score: 0.31 # Quality (ROE, margins) (increased from 0.25)
  filters:
    min_roe: 0.03
    min_net_margin: 0.02
    max_debt_to_equity: 1.8
    min_market_cap: null
    min_avg_volume: null
  vertical:
    top_k_per_sector: 8
    export_candidates: true
  horizontal:
    portfolio_size: 10
    max_position_weight: 0.15
    min_position_weight: 0.02
    max_sector_weight: 0.3
    target_max_drawdown: 0.2
    target_volatility: 0.25
    min_diversification: 0.7
    selection_method: heuristic
    max_combinations: 1000
