# Per-ticker configuration for NVDA (AI name)
# Regime-aware VIX gating and institutional volume/OBV filter per QuantaAlpha §6.

ticker: NVDA

trigger:
  rsi_period: 14
  rsi_oversold: 30
  rsi_overbought: 70
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  bb_std: 2.0
  macro_factors:
    vix_enabled: true
    vix_buy_max: 25
    vix_sell_min: 30
    volume_surge_min: 2.0
    obv_slope_positive: true

horizon_days: 63
return_periods: [21, 63, 126, 252]
volatility_windows: [20, 60]
volume_window: 20

backtest:
  train_years: 1.0
  test_years: 0.25
  step_value: 0.5
  step_unit: days
  rebalance_freq: 4h
